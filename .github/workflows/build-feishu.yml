name: Build ZeroClaw (ARM64, channels-full)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version tag (default: latest)'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: zeroclaw-full

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: zeroclaw-labs/zeroclaw
          ref: master
          submodules: true
          fetch-depth: 1

      - name: Apply Dockerfile patches
        run: |
          # Add apps/zerocode Cargo.toml copy
          sed -i '/^COPY apps\/tauri\/Cargo.toml apps\/tauri\/Cargo.toml$/a COPY apps\/zerocode\/Cargo.toml apps\/zerocode\/Cargo.toml' Dockerfile

          # Add zerocode stub
          sed -i '/echo "fn main() {}" > apps\/tauri\/build.rs$/a\    && mkdir -p apps\/zerocode/src \\\n    && echo "fn main() {}" > apps\/zerocode/src/main.rs \\' Dockerfile

          # Add esp32_sim stub
          sed -i '/for d in crates\/\*\/; do mkdir -p "${d}src" && printf .* > "${d}src\/lib.rs"; done$/a\    && mkdir -p crates/zeroclaw-hardware/examples \\\n    && echo "fn main() {}" > crates/zeroclaw-hardware/examples/esp32_sim.rs \\' Dockerfile

          # Add locales.toml copy
          sed -i '/^COPY \*\.rs .$/a COPY locales.toml .' Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.version || 'latest' }}
          build-args: |
            ZEROCLAW_CARGO_FEATURES=channels-full
          cache-from: type=gha
          cache-to: type=gha,mode=max
