name: Build ZeroClaw (ARM64, channels-full)

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: zeroclaw-full

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          repository: zeroclaw-labs/zeroclaw
          ref: master
          submodules: true
          fetch-depth: 1

      - name: Use PR #5187 Dockerfile (cross-compile ARM64)
        run: |
          curl -sL "https://raw.githubusercontent.com/zeroclaw-labs/zeroclaw/pull/5187/head/Dockerfile" > Dockerfile

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (ARM64, channel-lark)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            ZEROCLAW_CARGO_FEATURES=channel-lark
          cache-from: type=gha
          cache-to: type=gha,mode=max
